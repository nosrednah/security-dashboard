<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Dashboard – Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: sans-serif;
            background: #ffffff;
            color: #1a1a2e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            width: 100%;
            max-width: 380px;
            border: 1px solid #d6cfc4;
            border-radius: 12px;
            overflow: hidden;
        }
        .card-header {
            background: #f5efe6;
            padding: 1.5rem;
            border-bottom: 1px solid #d6cfc4;
        }
        .card-header h1 { font-size: 18px; font-weight: 600; }
        .card-header p { font-size: 13px; color: #6b6b80; margin-top: 4px; }
        .tabs {
            display: flex;
            border-bottom: 1px solid #d6cfc4;
            background: #faf9f7;
        }
        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            font-size: 14px;
            cursor: pointer;
            color: #6b6b80;
            border-bottom: 2px solid transparent;
        }
        .tab.active {
            color: #1a1a2e;
            font-weight: 600;
            border-bottom: 2px solid #1a1a2e;
            background: #ffffff;
        }
        .form-body { padding: 1.5rem; background: #ffffff; }
        .form-group { margin-bottom: 14px; }
        label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 5px; }
        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d6cfc4;
            border-radius: 8px;
            background: #faf9f7;
            color: #1a1a2e;
            font-size: 14px;
        }
        button[type="submit"] {
            width: 100%;
            padding: 11px;
            background: #1a1a2e;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 4px;
        }
        button[type="submit"]:hover { background: #2e2e4a; }
        .error {
            margin-top: 12px;
            padding: 10px 12px;
            background: #fef2f2;
            border: 1px solid #f87171;
            color: #b91c1c;
            border-radius: 8px;
            font-size: 13px;
            display: none;
        }
        .form-panel { display: none; }
        .form-panel.active { display: block; }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-header">
            <h1>Security Dashboard</h1>
            <p>Sign in to access your security tools and scan history.</p>
        </div>
        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">Login</div>
            <div class="tab" onclick="switchTab('register')">Register</div>
        </div>
        <div class="form-body">
            <div id="panel-login" class="form-panel active">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="login-username" placeholder="Enter username" />
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" placeholder="Enter password" />
                </div>
                <button type="submit" onclick="doLogin()">Login</button>
                <div class="error" id="login-error"></div>
            </div>
            <div id="panel-register" class="form-panel">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="reg-username" placeholder="Choose a username" />
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="reg-password" placeholder="Choose a password" />
                </div>
                <button type="submit" onclick="doRegister()">Create Account</button>
                <div class="error" id="reg-error"></div>
            </div>
        </div>
    </div>

    <script>
function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
    document.querySelector(`.tab:nth-child(${tab === 'login' ? 1 : 2})`).classList.add('active');
    document.getElementById('panel-' + tab).classList.add('active');
}

async function doLogin() {
    const username = document.getElementById('login-username').value;
    const password = document.getElementById('login-password').value;
    const err = document.getElementById('login-error');
    const res = await fetch('/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({username, password}) });
    const data = await res.json();
    if (data.success) { window.location.href = '/'; }
    else { err.textContent = data.error; err.style.display = 'block'; }
}

async function doRegister() {
    const username = document.getElementById('reg-username').value;
    const password = document.getElementById('reg-password').value;
    const err = document.getElementById('reg-error');
    const res = await fetch('/register', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({username, password}) });
    const data = await res.json();
    if (data.success) { window.location.href = '/'; }
    else { err.textContent = data.error; err.style.display = 'block'; }
}
    </script>
</body>
</html>
