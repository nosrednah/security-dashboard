<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Dashboard</title>
    <style>
        body {
            background: #0a0e1a;
            color: #e2e8f0;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            padding: 60px 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        p {
            color: #64748b;
            margin-bottom: 32px;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            background: #111827;
            border: 1px solid #1e2d45;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 14px;
            margin-bottom: 12px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #00e5ff;
            color: #0a0e1a;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }
        button:hover {
            background: #00b8cc;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Security Dashboard</h1>
        <p>Check if your email has been in a data breach</p>
        <input type="text" id="emailInput" placeholder="Enter your email">
        <button type="button">Check Email</button>
    </div>
</body>
</html>
