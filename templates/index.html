<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: sans-serif;
            background: #ffffff;
            color: #1a1a2e;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 40px 20px;
        }
        .app {
            display: flex;
            width: 100%;
            max-width: 750px;
            min-height: 420px;
            border: 1px solid #d6cfc4;
            border-radius: 12px;
            overflow: hidden;
        }
        .sidebar {
            width: 200px;
            background: #f5efe6;
            border-right: 1px solid #d6cfc4;
            padding: 1.5rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex-shrink: 0;
        }
        .sidebar-title {
            font-size: 11px;
            font-weight: 600;
            color: #8a7f72;
            margin-bottom: 12px;
            letter-spacing: 0.08em;
        }
        .nav-item {
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            color: #5a5248;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-item.active {
            background: #ede6da;
            color: #1a1a2e;
            border: 1px solid #d6cfc4;
            font-weight: 500;
        }
        .nav-item:hover:not(.active) {
            background: #ede6da;
        }
        .nav-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .dot-email { background: #378ADD; }
        .dot-password { background: #1D9E75; }
        .dot-url { background: #D85A30; }
        .main {
            flex: 1;
            padding: 1.5rem;
            background: #ffffff;
        }
        .panel { display: none; }
        .panel.active { display: block; }
        .panel-title {
            font-size: 16px;
            font-weight: 500;
            color: #1a1a2e;
            margin-bottom: 4px;
        }
        .panel-desc {
            font-size: 13px;
            color: #6b6b80;
            margin-bottom: 1.5rem;
        }
        .input-row {
            display: flex;
            gap: 8px;
        }
        .input-row input {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #d6cfc4;
            border-radius: 8px;
            background: #faf9f7;
            color: #1a1a2e;
            font-size: 14px;
        }
        .input-row button {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            background: #1a1a2e;
            color: #ffffff;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
            font-weight: 700;
        }
        .input-row button:hover { background: #2e2e4a; }
        .result-box {
            margin-top: 1rem;
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }
        .result-danger {
            background: #fef2f2;
            border: 1px solid #f87171;
            color: #b91c1c;
        }
        .result-success {
            background: #f0fdf4;
            border: 1px solid #4ade80;
            color: #15803d;
        }
        .result-warning {
            background: #fffbeb;
            border: 1px solid #fbbf24;
            color: #92400e;
        }
        .strength-bar {
            margin-top: 12px;
            height: 6px;
            border-radius: 3px;
            background: #e5e7eb;
            overflow: hidden;
        }
        .strength-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="sidebar">
            <div class="sidebar-title">SECURITY TOOLS</div>
            <div class="nav-item active" onclick="switchPanel('email', this)">
                <div class="nav-dot dot-email"></div> Email Breach
            </div>
            <div class="nav-item" onclick="switchPanel('password', this)">
                <div class="nav-dot dot-password"></div> Password
            </div>
            <div class="nav-item" onclick="switchPanel('url', this)">
                <div class="nav-dot dot-url"></div> URL Checker
            </div>
        </div>

        <div class="main">
            <div id="panel-email" class="panel active">
                <div class="panel-title">Email Breach Checker</div>
                <div class="panel-desc">Check if your email appeared in a known data breach.</div>
                <div class="input-row">
                    <input type="text" id="emailInput" placeholder="you@example.com" />
                    <button onclick="checkEmail()">Check</button>
                </div>
                <div id="emailResult" class="result-box"></div>
            </div>

            <div id="panel-password" class="panel">
                <div class="panel-title">Password Strength</div>
                <div class="panel-desc">Analyse how strong your password is.</div>
                <div class="input-row">
                    <input type="password" id="passwordInput" placeholder="Enter a password" />
                    <button onclick="checkPassword()">Check</button>
                </div>
                <div id="passwordResult" class="result-box"></div>
                <div class="strength-bar" id="strengthBar" style="display:none">
                    <div class="strength-fill" id="strengthFill"></div>
                </div>
            </div>

            <div id="panel-url" class="panel">
                <div class="panel-title">URL Safety Checker</div>
                <div class="panel-desc">Detect malware, phishing and dangerous links.</div>
                <div class="input-row">
                    <input type="text" id="urlInput" placeholder="https://example.com" />
                    <button onclick="checkUrl()">Check</button>
                </div>
                <div id="urlResult" class="result-box"></div>
            </div>
        </div>
    </div>

    <script>
function switchPanel(name, el) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('panel-' + name).classList.add('active');
    el.classList.add('active');
}

async function checkEmail() {
    const email = document.getElementById('emailInput').value;
    const resultDiv = document.getElementById('emailResult');
    resultDiv.style.display = 'block';
    resultDiv.className = 'result-box';
    resultDiv.textContent = 'Checking...';
    const response = await fetch('/check-email', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({email}) });
    const result = await response.json();
    resultDiv.textContent = result.message;
    resultDiv.className = 'result-box ' + (result.message.includes('⚠️') ? 'result-danger' : 'result-success');
}

async function checkPassword() {
    const password = document.getElementById('passwordInput').value;
    const resultDiv = document.getElementById('passwordResult');
    const bar = document.getElementById('strengthBar');
    const fill = document.getElementById('strengthFill');
    resultDiv.style.display = 'block';
    resultDiv.className = 'result-box';
    resultDiv.textContent = 'Checking...';
    const response = await fetch('/check-password', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({password}) });
    const result = await response.json();
    const feedback = result.feedback.length ? result.feedback.join(', ') : 'Great password!';
    resultDiv.textContent = 'Strength: ' + result.strength + ' — ' + feedback;
    bar.style.display = 'block';
    const pct = (result.score / 5) * 100;
    const colors = { Weak: '#E24B4A', Medium: '#EF9F27', Strong: '#639922', 'Very Strong': '#1D9E75' };
    const cls = { Weak: 'result-danger', Medium: 'result-warning', Strong: 'result-success', 'Very Strong': 'result-success' };
    fill.style.width = pct + '%';
    fill.style.background = colors[result.strength];
    resultDiv.className = 'result-box ' + cls[result.strength];
}

async function checkUrl() {
    const url = document.getElementById('urlInput').value;
    const resultDiv = document.getElementById('urlResult');
    resultDiv.style.display = 'block';
    resultDiv.className = 'result-box';
    resultDiv.textContent = 'Checking...';
    const response = await fetch('/check-url', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({url}) });
    const result = await response.json();
    resultDiv.textContent = result.message;
    resultDiv.className = 'result-box ' + (result.message.includes('⚠️') ? 'result-danger' : 'result-success');
}
    </script>
</body>
</html>
