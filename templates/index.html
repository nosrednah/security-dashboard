<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Dashboard</title>
    <style>
        body {
            background: #0a0e1a;
            color: #e2e8f0;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            padding: 60px 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        p {
            color: #64748b;
            margin-bottom: 32px;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            background: #111827;
            border: 1px solid #1e2d45;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 14px;
            margin-bottom: 12px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #00e5ff;
            color: #0a0e1a;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }
        button:hover {
            background: #00b8cc;
        }
        #result, #passwordResult {
            margin-top: 20px;
            padding: 14px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }
        .breach {
            background: #2d1b1b;
            border: 1px solid #ff4444;
            color: #ff4444;
        }
        .safe {
            background: #1b2d1b;
            border: 1px solid #00ff88;
            color: #00ff88;
        }
        #result, #passwordResult, #urlResult {
            margin-top: 20px;
            padding: 14px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
    }
    </style>
</head>
<body>
    <div class="container">
        <h1>Security Dashboard</h1>
        <p>Check if your email has been in a data breach</p>
        <input type="text" id="emailInput" placeholder="Enter your email">
        <button type="button" onclick="checkEmail()">Check Email</button>
        <div id="result"></div>

        <h2 style="font-size: 18px; margin-top: 40px; margin-bottom: 8px;">Password Strength Checker</h2>
        <input type="password" id="passwordInput" placeholder="Enter a password">
        <button type="button" onclick="checkPassword()">Check Password</button>
        <div id="passwordResult"></div>
        
        <h2 style="font-size: 18px; margin-top: 40px; margin-bottom: 8px;">URL Safety Checker</h2>
        <input type="text" id="urlInput" placeholder="Enter a URL (e.g. https://example.com)">
        <button type="button" onclick="checkUrl()">Check URL</button>
        <div id="urlResult"></div>
    </div>

    <script>
async function checkEmail() {
    const email = document.getElementById('emailInput').value;
    const resultDiv = document.getElementById('result');
    
    resultDiv.style.display = 'block';
    resultDiv.className = '';
    resultDiv.textContent = 'Checking...';

    const response = await fetch('/check-email', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email })
    });

    const result = await response.json();
    resultDiv.textContent = result.message;

    if (result.message.includes('⚠️')) {
        resultDiv.className = 'breach';
    } else {
        resultDiv.className = 'safe';
    }
}

async function checkPassword() {
    const password = document.getElementById('passwordInput').value;
    const resultDiv = document.getElementById('passwordResult');
    
    resultDiv.style.display = 'block';
    resultDiv.textContent = 'Checking...';

    const response = await fetch('/check-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: password })
    });

    const result = await response.json();
    
    resultDiv.textContent = `Strength: ${result.strength} — ${result.feedback.join(', ') || 'Great password!'}`;
    
    if (result.strength === 'Weak') {
        resultDiv.className = 'breach';
    } else if (result.strength === 'Very Strong') {
        resultDiv.className = 'safe';
    } else {
        resultDiv.className = '';
        resultDiv.style.background = '#1a1a2e';
        resultDiv.style.border = '1px solid #f0a500';
        resultDiv.style.color = '#f0a500';
        resultDiv.style.padding = '14px';
        resultDiv.style.borderRadius = '8px';
    }
}
async function checkUrl() {
    const url = document.getElementById('urlInput').value;
    const resultDiv = document.getElementById('urlResult');
    
    resultDiv.style.display = 'block';
    resultDiv.className = '';
    resultDiv.textContent = 'Checking...';

    const response = await fetch('/check-url', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: url })
    });

    const result = await response.json();
    resultDiv.textContent = result.message;

    if (result.message.includes('⚠️')) {
        resultDiv.className = 'breach';
    } else {
        resultDiv.className = 'safe';
    }
}
    </script>
</body>
</html>
